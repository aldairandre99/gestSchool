services:

    ####################################################################################################
    # PHP
    ####################################################################################################
    php:
        build: .docker/php
        ports:
            - 5173:5173
        volumes:
            - .:/var/www:cached
        depends_on:
            - db
            - redis

    ####################################################################################################
    # Nginx
    ####################################################################################################
    nginx:
        image: nginx
        ports:
            - 8000:80
        volumes:
            - .:/var/www
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - .docker/nginx/nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - php

    ####################################################################################################
    # PostgreSQL
    ####################################################################################################
    db:
        image: postgres:18
        ports:
            - 5432:5432
        volumes:
            - db_data:/var/lib/postgresql
            - .docker/db/sql:/docker-entrypoint-initdb.d
        environment:
            POSTGRES_USER: gestschool
            POSTGRES_PASSWORD: gestschool
            POSTGRES_DB: gestschool

    ####################################################################################################
    # pgAdmin
    ####################################################################################################
    pgadmin:
        image: dpage/pgadmin4
        ports:
            - 5050:80
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@admin.com
            PGADMIN_DEFAULT_PASSWORD: password
            PGADMIN_CONFIG_SERVER_MODE: 'False'
        depends_on:
            - db

    ####################################################################################################
    # Mailpit
    ####################################################################################################
    mail:
        image: axllent/mailpit:latest
        ports:
            - 8025:8025
            - 1025:1025

    ####################################################################################################
    # Scheduler — corre `php artisan schedule:work` 24/7 para os jobs agendados
    # (backups diários, limpeza, etc.). Usa a mesma imagem do php.
    ####################################################################################################
    scheduler:
        build: .docker/php
        command: php artisan schedule:work
        volumes:
            - .:/var/www:cached
        depends_on:
            - db
            - redis

    ####################################################################################################
    # Redis
    ####################################################################################################
    redis:
        image: redis:latest
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        ports:
            - 6379:6379

    ####################################################################################################
    # ngrok Tunnel (perfil "tunnel" — só arranca via `make tunnel`)
    # URL fixa em NGROK_DOMAIN, autenticada via NGROK_AUTHTOKEN (ambos do .env).
    ####################################################################################################
    ngrok:
        image: ngrok/ngrok:latest
        profiles: [tunnel]
        command: http --url=https://${NGROK_DOMAIN:?NGROK_DOMAIN tem de estar no .env} nginx:80
        environment:
            NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?NGROK_AUTHTOKEN tem de estar no .env}
        depends_on:
            - nginx

volumes:
    db_data:
    redis_data:
